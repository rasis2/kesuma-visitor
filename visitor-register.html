<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Pelawat — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .qr-wrap{display:flex;flex-direction:column;align-items:center;padding:16px 0 8px}
    #qrCanvas{display:flex;justify-content:center}
    #qrCanvas canvas,#qrCanvas img{border-radius:10px;border:3px solid var(--accent);padding:8px;background:#fff}
    .ref-box{background:var(--accent-dim);border:1px solid rgba(var(--accent-rgb),.3);border-radius:10px;padding:14px 18px;text-align:center;margin:14px 0}
    .ref-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
    .ref-code{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--accent);letter-spacing:4px}
    .action-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
    .btn-action{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--body-font);transition:all .2s}
    .btn-action:hover{border-color:rgba(var(--accent-rgb),.4);color:var(--accent)}
    .btn-copied{border-color:var(--green)!important;color:var(--green)!important}
    .success-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center}
    .info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .info-row:last-child{border-bottom:none}
    .info-label{color:var(--text-muted)}
    .info-val{font-weight:600;text-align:right;max-width:60%}
    .approved-note{background:var(--green-dim,rgba(76,175,125,.1));border:1px solid rgba(76,175,125,.25);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--green);margin-top:14px;line-height:1.6}
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main">

    <!-- FORM VIEW -->
    <div id="formView">
      <div class="page-header animate-in">
        <div class="page-icon teal">📝</div>
        <h1 class="page-title" data-i18n="vis_reg_title">Daftar Pelawat</h1>
        <p class="page-subtitle" data-i18n="vis_reg_sub">Sila isi maklumat untuk melawat</p>
      </div>

      <!-- UNIT -->
      <div class="section animate-in" style="animation-delay:.04s">
        <div class="section-title" data-i18n="vis_sec_unit">UNIT YANG DILAWATI</div>
        <div class="field">
          <label data-i18n="res_floor_label">Tingkat</label>
          <div class="select-wrap">
            <select id="floorSelect" onchange="onFloorChange()">
              <option value="">— Pilih Tingkat —</option>
            </select>
          </div>
        </div>
        <div class="field" id="unitField" style="display:none">
          <label data-i18n="res_unit_label">No. Unit</label>
          <div class="select-wrap">
            <select id="unitSelect" onchange="onUnitChange()">
              <option value="">— Pilih Unit —</option>
            </select>
          </div>
        </div>
        <div id="unitConfirm" style="display:none;padding:10px 14px;background:var(--accent-dim);border:1px solid rgba(var(--accent-rgb),.25);border-radius:8px;margin-top:-4px">
          <span style="font-size:12px;color:var(--text-muted)">Unit:</span>
          <span id="unitConfirmVal" style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);margin-left:8px"></span>
        </div>
        <input type="hidden" id="unit">
      </div>

      <!-- VISITOR INFO -->
      <div class="section animate-in" style="animation-delay:.06s">
        <div class="section-title" data-i18n="vis_sec_info">MAKLUMAT PELAWAT</div>
        <div class="field">
          <label data-i18n="vis_name">Nama Penuh</label>
          <input id="visName" type="text" data-i18n="vis_name_ph" placeholder="Nama IC">
        </div>
        <div class="field">
          <label data-i18n="vis_ic">No. IC</label>
          <input id="visIc" type="text" data-i18n="vis_ic_ph" placeholder="900101-10-1234">
        </div>
        <div class="field">
          <label data-i18n="vis_phone">No. Telefon</label>
          <input id="visPhone" type="tel" data-i18n="vis_phone_ph" placeholder="0123456789">
        </div>
      </div>

      <!-- VEHICLE -->
      <div class="section animate-in" style="animation-delay:.08s">
        <div class="section-title" data-i18n="vis_sec_veh">KENDERAAN</div>
        <div class="field">
          <label data-i18n="vis_v_type">Jenis Kenderaan</label>
          <div class="select-wrap">
            <select id="visVehicleType" onchange="onVehicleChange()">
              <option value="" data-i18n="vis_v_type_ph">— Pilih —</option>
              <option value="Kereta" data-i18n="vis_v_car">Kereta</option>
              <option value="Motosikal" data-i18n="vis_v_moto">Motosikal</option>
              <option value="Lori / Van" data-i18n="vis_v_lorry">Lori / Van</option>
              <option value="Tiada" data-i18n="vis_v_none">Tiada Kenderaan</option>
            </select>
          </div>
        </div>
        <div class="field" id="plateField">
          <label data-i18n="vis_v_plate">No. Plat</label>
          <input id="visPlate" type="text" style="text-transform:uppercase" data-i18n="vis_v_plate_ph">
        </div>
      </div>

      <!-- PURPOSE -->
      <div class="section animate-in" style="animation-delay:.1s">
        <div class="section-title" data-i18n="vis_sec_purp">TUJUAN LAWATAN</div>
        <div class="field">
          <label data-i18n="vis_purpose">Tujuan</label>
          <div class="select-wrap">
            <select id="visPurpose">
              <option value="" data-i18n="vis_purpose_ph">— Pilih —</option>
              <option value="Ziarah" data-i18n="vis_purp_visit">Ziarah</option>
              <option value="Hantar Barang" data-i18n="vis_purp_del">Hantar Barang</option>
              <option value="Kerja" data-i18n="vis_purp_work">Kerja</option>
              <option value="Pembaikan" data-i18n="vis_purp_rep">Pembaikan</option>
              <option value="Lain-lain" data-i18n="vis_purp_oth">Lain-lain</option>
            </select>
          </div>
        </div>
      </div>

      <button class="btn btn-gold animate-in" style="animation-delay:.12s" onclick="registerVisitor()" id="txt-submit" data-i18n="vis_submit">Daftar Sekarang</button>
    </div>

    <!-- SUCCESS VIEW -->
    <div id="successView" style="display:none" class="animate-in">
      <div class="success-card">
        <div style="font-size:48px;margin-bottom:12px">✅</div>
        <h2 style="font-family:var(--heading-font);font-size:20px;font-weight:800;margin-bottom:6px" data-i18n="vis_success">Pendaftaran Berjaya!</h2>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:4px" data-i18n="vis_success_sub">Ready (Auto-Lulus).</p>

        <div class="ref-box">
          <div class="ref-label" data-i18n="vis_ref_code">KOD RUJUKAN</div>
          <div class="ref-code" id="refCode"></div>
        </div>
        <div class="action-btns">
          <button class="btn-action" id="copyBtn" onclick="copyCode()">📋 <span data-i18n="vis_copy_code">Salin Kod</span></button>
          <button class="btn-action" onclick="downloadQR()">⬇️ <span data-i18n="vis_download_qr">Muat Turun</span></button>
        </div>
        <div class="qr-wrap">
          <div id="qrCanvas"></div>
          <p style="font-size:11px;color:var(--text-muted);margin-top:10px" data-i18n="vis_qr_hint"></p>
        </div>
        <div id="statusNote">
           <div class="approved-note">✅ Pendaftaran telah <strong>auto-diluluskan</strong>. Sila tunjukkan QR kepada guard untuk Check In segera.</div>
        </div>
        <div style="margin-top:16px;text-align:left">
          <div class="section-title" data-i18n="vis_details">MAKLUMAT PENDAFTARAN</div>
          <div id="detailRows"></div>
        </div>
        <button class="btn btn-gold" style="margin-top:20px" onclick="resetForm()" data-i18n="vis_new_reg"></button>
      </div>
    </div>
  </main>
  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/api.js"></script>
  <script src="js/helpers.js"></script>
  <script>
    const urlParams  = new URLSearchParams(location.search)
    const fromOwner  = urlParams.get('from') === 'owner'
    const fromGuard  = urlParams.get('from') === 'guard'
    const preUnit    = urlParams.get('unit') || ''
    
    renderNav(fromGuard ? 'role_security' : 'role_owner')

    // Dropdown unit logic
    const floorSel = document.getElementById('floorSelect')
    FLOORS.forEach(f => {
      const o = document.createElement('option'); o.value = f; 
      o.textContent = t('res_floor_label') + ' ' + f; floorSel.appendChild(o)
    })

    function onFloorChange() {
      const f  = floorSel.value; const us = document.getElementById('unitSelect')
      document.getElementById('unit').value = ''; document.getElementById('unitConfirm').style.display = 'none'
      document.getElementById('unitField').style.display = f ? 'block' : 'none'
      if (!f) return
      us.innerHTML = `<option value="">${t('res_unit_ph')}</option>`
      UNITS.forEach(u => {
        const o = document.createElement('option'); o.value = f + '-' + u; 
        o.textContent = t('res_unit_label') + ' ' + u; us.appendChild(o)
      })
    }

    function onUnitChange() {
      const v = document.getElementById('unitSelect').value; document.getElementById('unit').value = v
      document.getElementById('unitConfirmVal').textContent = v; document.getElementById('unitConfirm').style.display = v ? 'block' : 'none'
    }

    function onVehicleChange() {
      const v = document.getElementById('visVehicleType').value
      document.getElementById('plateField').style.display = v === 'Tiada' ? 'none' : 'block'
      if (v === 'Tiada') document.getElementById('visPlate').value = 'TIADA'
    }

    if (preUnit) {
      const parts = preUnit.split('-'); if (parts.length >= 2) {
        floorSel.value = parts[0]; onFloorChange()
        setTimeout(() => { document.getElementById('unitSelect').value = preUnit; onUnitChange(); if (fromOwner) { document.getElementById('floorSelect').disabled = true; document.getElementById('unitSelect').disabled = true; } }, 50)
      }
    }

    async function registerVisitor() {
      const unit = document.getElementById('unit').value; const name = document.getElementById('visName').value.trim()
      const ic = document.getElementById('visIc').value.trim(); const tel = document.getElementById('visPhone').value.trim()
      const vt = document.getElementById('visVehicleType').value; const vp = document.getElementById('visPlate').value.trim().toUpperCase()
      const pr = document.getElementById('visPurpose').value

      if (!unit || !name || !ic || !tel || !vp || !pr) { showToast(t('vis_error_fill'), 'error-toast'); return }
      
      const btn = document.getElementById('txt-submit'); btn.innerHTML = `⏳ ${t('loading')}`; btn.disabled = true

      try {
        const role = fromGuard ? 'guard' : (fromOwner ? 'owner' : 'visitor')
        const expiry = new Date(); expiry.setHours(expiry.getHours() + 24)
        
        const payload = {
          name, ic_no: ic, phone: tel, vehicle_type: vt, vehicle_plate: vp, unit, purpose: pr,
          registered_by: role, status: 'Approved', approved_by: 'Auto-System', expires_at: expiry.toISOString()
        }

        const result = await apiRegisterVisitor(payload)
        showSuccess(result, payload)
      } catch(e) { showToast(t('error_server'), 'error-toast') }
      finally { btn.innerHTML = t('vis_submit'); btn.disabled = false }
    }

    function showSuccess(visitor, info) {
      document.getElementById('formView').style.display = 'none'; document.getElementById('successView').style.display = 'block'
      const ref = visitor.ref_code; document.getElementById('refCode').textContent = ref
      const qc = document.getElementById('qrCanvas'); qc.innerHTML = ''
      new QRCode(qc, { text: ref, width: 180, height: 180, colorDark: '#000000', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H })
      
      const rows = [[t('vis_name'), info.name],[t('vis_ic'), info.ic_no],[t('vis_phone'), info.phone],['Unit', info.unit],[t('vis_purpose'), info.purpose],[t('vis_v_plate'), info.vehicle_plate]]
      document.getElementById('detailRows').innerHTML = rows.map(([l, v]) => `<div class="info-row"><span class="info-label">${l}</span><span class="info-val">${v}</span></div>`).join('')
      window._currentRef = ref
    }

    function copyCode() {
      navigator.clipboard.writeText(window._currentRef).then(() => {
        const btn = document.getElementById('copyBtn'); btn.classList.add('btn-copied')
        btn.innerHTML = `✓ ${t('vis_copied')}`; setTimeout(() => { btn.classList.remove('btn-copied'); btn.innerHTML = `📋 ${t('vis_copy_code')}` }, 2000)
      })
    }

    function downloadQR() {
      const canvas = document.querySelector('#qrCanvas canvas'); if (!canvas) return
      const a = document.createElement('a'); a.download = 'visitor-' + window._currentRef + '.png'; a.href = canvas.toDataURL('image/png'); a.click()
    }

    function resetForm() { location.reload() }
  </script>
</body>
</html>
