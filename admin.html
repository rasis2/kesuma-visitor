<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
    .menu-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;transition:all .2s;cursor:pointer;min-height:100px}
    .menu-card:hover{border-color:rgba(var(--accent-rgb),.4);background:var(--surface);transform:translateY(-2px);box-shadow:var(--shadow)}
    .menu-icon{font-size:28px}
    .menu-label{font-family:var(--heading-font);font-size:13px;font-weight:700}
    .menu-desc{font-size:11px;color:var(--text-muted);line-height:1.4}
    .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);cursor:pointer;margin-bottom:16px;padding:6px 0}
    .back-btn:hover{color:var(--accent)}
    .vis-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
    .vis-row:last-child{border-bottom:none}
    .vis-row-name{font-weight:700;font-size:14px}
    .vis-row-meta{font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
    .unit-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
    .unit-title{font-family:var(--heading-font);font-size:15px;font-weight:800;margin-bottom:10px;font-family:'JetBrains Mono',monospace}
    .phone-item{display:flex;gap:8px;align-items:center;margin-bottom:6px}
    .phone-item input{flex:1;font-size:12px}
    .badge-urgent{background:rgba(224,92,92,.15);color:var(--red);border:1px solid rgba(224,92,92,.3)}
    /* Style tambahan untuk input password */
    .pass-input{border-color:rgba(var(--accent-rgb), 0.2)!important; background: var(--bg)!important;}
    .reg-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:4px;background:var(--surface3);color:var(--text-muted);font-weight:700;text-transform:uppercase;margin:4px 0;border:1px solid var(--border)}
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main" id="mainContent"></main>
  <div class="toast" id="toast"></div>

  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/api.js"></script>
  <script src="js/helpers.js"></script>
  <script>
    const session = requireSession(['admin'])
    if (!session) throw new Error('no session')
    renderNav('', session)

    function showHome() {
      document.getElementById('mainContent').innerHTML = `
        <div class="page-header animate-in">
          <div class="page-icon red">⚙️</div>
          <h1 class="page-title">${t('role_admin')}</h1>
          <p class="page-subtitle">${session.name}</p>
        </div>
        <div class="menu-grid animate-in" style="animation-delay:.05s">
            <div class="menu-card" onclick="showLog()">
              <div class="menu-icon">📋</div>
              <div class="menu-label">${t('tab_log')}</div>
              <div class="menu-desc">${t('admin_all_records_desc')}</div>
            </div>
            <div class="menu-card" onclick="showUnits()">
              <div class="menu-icon">🏠</div>
              <div class="menu-label">${t('tab_units')}</div>
              <div class="menu-desc">${t('admin_edit_prof')}</div>
            </div>
        </div>`
    }

    // ── LOG ────────────────────────────────────────────────
    async function showLog() {
      document.getElementById('mainContent').innerHTML = `
        <div class="back-btn" onclick="showHome()">${t('nav_back')}</div>
        <div class="page-header animate-in">
          <div class="page-icon gold">📋</div>
          <h1 class="page-title">${t('tab_log')}</h1>
          <p class="page-subtitle">${t('admin_all_units')}</p>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
          <input id="logSearch" oninput="filterAdminLog()" style="flex:1;min-width:120px;height:40px" placeholder="${t('search_ph')}">
          <div class="select-wrap" style="flex:0 0 150px">
            <select id="logFilter" onchange="filterAdminLog()" style="height:40px">
              <option value="all">${t('admin_filter_all')}</option>
              <option value="Pending">${t('status_pending')}</option>
              <option value="Approved">${t('status_approved')}</option>
              <option value="Checked In">${t('status_checkedin')}</option>
              <option value="Checked Out">${t('status_checkedout')}</option>
              <option value="Rejected">${t('status_rejected')}</option>
            </select>
          </div>
        </div>
        <div id="logStats" class="section animate-in" style="display:flex;gap:0;padding:0;overflow:hidden;margin-bottom:12px"></div>
        <div class="section animate-in" style="padding:10px 16px;animation-delay:.08s">
          <div id="logContent"><p style="font-size:13px;color:var(--text-muted);text-align:center;padding:20px">${t('loading')}</p></div>
        </div>`
      const all = await apiGetAllVisitors()
      window._adminLog = all
      const today = new Date().toDateString()
      document.getElementById('logStats').innerHTML = `
        <div style="flex:1;padding:14px;text-align:center;border-right:1px solid var(--border)">
          <div class="num" style="font-size:22px;color:var(--accent)">${all.filter(v=>new Date(v.created_at).toDateString()===today).length}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${t('today')}</div>
        </div>
        <div style="flex:1;padding:14px;text-align:center;border-right:1px solid var(--border)">
          <div class="num" style="font-size:22px;color:var(--green)">${all.filter(v=>v.status==='Checked In').length}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${t('inside')}</div>
        </div>
        <div style="flex:1;padding:14px;text-align:center">
          <div class="num" style="font-size:22px">${all.length}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${t('total')}</div>
        </div>`
      filterAdminLog()
    }

    function filterAdminLog() {
      const s = (document.getElementById('logSearch')?.value||'').toUpperCase()
      const f = document.getElementById('logFilter')?.value||'all'
      let list = window._adminLog||[]
      if (f !== 'all') list = list.filter(v=>v.status===f)
      if (s) list = list.filter(v=>v.ref_code.includes(s)||v.name.toUpperCase().includes(s)||v.unit.includes(s))
      const el = document.getElementById('logContent')
      if (!list.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>${t('owner_no_visitors')}</p></div>`; return }
      
      const regLabels = { 'visitor': t('reg_by_visitor'), 'owner': t('reg_by_owner'), 'tenant': t('reg_by_tenant'), 'guard': t('reg_by_guard') }

      el.innerHTML = list.map(v=>`
        <div class="vis-row">
          <div style="flex:1;min-width:0">
            <div class="vis-row-name">${v.name}</div>
            <div style="font-size:11px; color:var(--accent); font-weight:700; margin-bottom:4px;">
              ${t('vis_ic')}: ${v.ic_no} · ${t('vis_phone')}: ${v.phone}
            </div>
            <div class="vis-row-meta">${v.ref_code} · ${t('res_unit_label')} ${v.unit}</div>
            <div style="font-size:11px;color:var(--text-muted)">${v.purpose} · ${v.vehicle_plate||'—'}</div>
            <div class="reg-tag">${regLabels[v.registered_by] || v.registered_by}</div>
            <div style="font-size:10px;color:var(--text-muted);margin-top:4px; border-top:1px solid var(--border); padding-top:4px;">
              ${t('today')}: ${fmtDate(v.created_at)}
              ${v.checked_in_at?`<br><span style="color:var(--green)">${t('status_checkedin')}: ${fmtDate(v.checked_in_at)}</span>`:''}
              ${v.checked_out_at?`<br><span style="color:var(--text-muted)">${t('status_checkedout')}: ${fmtDate(v.checked_out_at)}</span>`:''}
            </div>
          </div>
          <div style="flex-shrink:0">${statusBadge(v.status)}</div>
        </div>`).join('')
    }

    // ── UNITS ──────────────────────────────────────────────
    async function showUnits() {
      document.getElementById('mainContent').innerHTML = `
        <div class="back-btn" onclick="showHome()">${t('nav_back')}</div>
        <div class="page-header animate-in">
          <div class="page-icon teal">🏠</div>
          <h1 class="page-title">${t('tab_units')}</h1>
          <p class="page-subtitle">${t('admin_edit_prof')}</p>
        </div>
        <div style="margin-bottom:10px">
          <input id="unitSearch" oninput="filterUnits()" style="height:40px" placeholder="${t('admin_search')}">
        </div>
        <div id="unitList"><p style="font-size:13px;color:var(--text-muted);text-align:center;padding:20px">${t('loading')}</p></div>
        <div class="pagination animate-in" style="margin-top:14px">
          <button class="btn btn-outline" onclick="prevPage()">${t('admin_prev')}</button>
          <span class="page-info" id="pageInfo">—</span>
          <button class="btn btn-outline" onclick="nextPage()">${t('admin_next')}</button>
        </div>`
      window._allOwners = sortUnits(await apiGetAllOwners())
      window._filteredOwners = [...window._allOwners]
      window._page = 1
      renderUnits()
    }

    function sortUnits(arr) {
      return arr.slice().sort((a,b)=>{
        const [af,au]=a.unit.split('-'), [bf,bu]=b.unit.split('-')
        const fd=parseInt(af)-parseInt(bf); if(fd!==0) return fd
        return (au==='23A'?23.5:parseInt(au)) - (bu==='23A'?23.5:parseInt(bu))
      })
    }

    function filterUnits() {
      const s = (document.getElementById('unitSearch')?.value||'').toLowerCase()
      window._filteredOwners = s ? sortUnits(window._allOwners.filter(o=>o.unit.toLowerCase().includes(s)||o.phone.includes(s)||(o.tenant1&&o.tenant1.includes(s)))) : [...window._allOwners]
      window._page = 1; renderUnits()
    }

    const PER_PAGE = 10
    function renderUnits() {
      const list = window._filteredOwners||[]
      const page = window._page||1
      const total = Math.max(1, Math.ceil(list.length/PER_PAGE))
      document.getElementById('pageInfo').textContent = page + ' / ' + total
      const slice = list.slice((page-1)*PER_PAGE, page*PER_PAGE)
      const el = document.getElementById('unitList')
      if (!slice.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">🏠</div><p>${t('admin_no_units')}</p></div>`; return }
      el.innerHTML = slice.map(o=>`
        <div class="unit-card animate-in">
          <div class="unit-title">${o.unit}</div>
          <div style="font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:6px">${t('owner').toUpperCase()}</div>
          <div class="phone-item">
            <input id="op-${o.unit}" value="${o.phone||''}" placeholder="${t('vis_phone')}" type="tel">
            <input id="oe-${o.unit}" value="${o.email||''}" placeholder="Email" type="email">
          </div>
          <div class="phone-item">
            <input id="opa-${o.unit}" class="pass-input" type="password" placeholder="${t('admin_set_pass_owner')}">
          </div>

          <div style="font-size:11px;color:var(--text-muted);font-weight:600;margin:10px 0 6px">${t('tenant').toUpperCase()}</div>
          ${[1,2,3].map(n=>`
            <div style="margin-bottom:12px; border-bottom:1px dashed var(--border); padding-bottom:8px">
              <div class="phone-item">
                <span style="font-size:11px;color:var(--text-muted);width:20px;flex-shrink:0">${n}</span>
                <input id="t${n}p-${o.unit}" value="${o['tenant'+n]||''}" placeholder="${t('vis_phone')}" type="tel">
                <input id="t${n}e-${o.unit}" value="${o['tenant'+n+'_email']||''}" placeholder="Email" type="email">
              </div>
              <div class="phone-item" style="padding-left:28px">
                <input id="t${n}pa-${o.unit}" class="pass-input" type="password" placeholder="${t('admin_set_pass_tenant')} ${n}">
              </div>
            </div>`).join('')}
          <button class="btn-green" onclick="saveAdminUnit('${o.unit}')" style="margin-top:10px;width:100%">💾 ${t('save')} ${t('admin_changes')}</button>
        </div>`).join('')
    }

    async function saveAdminUnit(unit) {
      const data = {
        phone: document.getElementById('op-'+unit).value||null,
        email: document.getElementById('oe-'+unit).value||null,
        tenant1: document.getElementById('t1p-'+unit).value||null,
        tenant1_email: document.getElementById('t1e-'+unit).value||null,
        tenant2: document.getElementById('t2p-'+unit).value||null,
        tenant2_email: document.getElementById('t2e-'+unit).value||null,
        tenant3: document.getElementById('t3p-'+unit).value||null,
        tenant3_email: document.getElementById('t3e-'+unit).value||null,
      }
      
      if (document.getElementById('opa-'+unit).value) data.password = document.getElementById('opa-'+unit).value
      if (document.getElementById('t1pa-'+unit).value) data.tenant1_password = document.getElementById('t1pa-'+unit).value
      if (document.getElementById('t2pa-'+unit).value) data.tenant2_password = document.getElementById('t2pa-'+unit).value
      if (document.getElementById('t3pa-'+unit).value) data.tenant3_password = document.getElementById('t3pa-'+unit).value

      const ok = await apiUpdateOwner(unit, data)
      showToast(ok ? t('res_unit_label') + ' ' + unit + ' ' + t('admin_saved') : t('admin_save_error'), ok?'success':'error-toast')
      
      if (ok) { 
        const o=window._allOwners.find(x=>x.unit===unit); if(o) Object.assign(o,data) 
        document.querySelectorAll(`.unit-card input[type="password"]`).forEach(i=>i.value='')
      }
    }

    function prevPage() { if((window._page||1)>1){ window._page--; renderUnits() } }
    function nextPage() { const t=Math.ceil((window._filteredOwners||[]).length/PER_PAGE); if((window._page||1)<t){ window._page++; renderUnits() } }

    showHome()
  </script>
</body>
</html>
