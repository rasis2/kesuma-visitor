<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
    .menu-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:20px 16px;text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;transition:all .2s;cursor:pointer;min-height:100px}
    .menu-card:hover{border-color:rgba(var(--accent-rgb),.4);background:var(--surface);transform:translateY(-2px);box-shadow:var(--shadow)}
    .menu-icon{font-size:28px}
    .menu-label{font-family:var(--heading-font);font-size:13px;font-weight:700}
    .menu-desc{font-size:11px;color:var(--text-muted);line-height:1.4}
    .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);cursor:pointer;margin-bottom:16px;padding:6px 0}
    .back-btn:hover{color:var(--accent)}
    .vis-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:border-color .2s}
    .vis-card:hover{border-color:var(--border2)}
    .vis-card.in{border-left:3px solid var(--green)}
    .vis-card.out{border-left:3px solid var(--text-muted);opacity:.7}
    .vis-name{font-family:var(--heading-font);font-size:14px;font-weight:700;margin-bottom:2px}
    .vis-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px;font-family:'JetBrains Mono',monospace}
    .btn-sm{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--body-font);transition:all .2s}
    .btn-checkin{background:rgba(99,179,237,.18);color:#63b3ed;border:1px solid rgba(99,179,237,.3); width: 100%; margin-top: 10px;}
    .btn-checkout{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}
    .btn-checkout:hover{background:var(--surface)}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px}
    .info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
    .info-row:last-child{border-bottom:none}
    .info-label{color:var(--text-muted)}
    .status-msg{padding:8px 12px;border-radius:7px;font-size:12px;font-weight:600;text-align:center;margin-top:10px}
    .status-msg.warn{background:rgba(201,168,76,.1);color:var(--accent)}
    .status-msg.err{background:rgba(224,92,92,.1);color:var(--red)}
    .status-msg.ok{background:rgba(76,175,125,.1);color:var(--green)}
    .contact-block{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-top:12px}
    .contact-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
    .contact-row:last-child{border-bottom:none}
    .reg-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:4px;background:var(--surface3);color:var(--text-muted);font-weight:700;text-transform:uppercase;margin:4px 0;border:1px solid var(--border)}
    #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; margin-bottom: 15px; display: none; background: #000; }
    #reader__dashboard_section_csr button { 
      background: var(--accent) !important; color: white !important; 
      border: none !important; padding: 8px 12px !important; 
      border-radius: 6px !important; cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main" id="mainContent"></main>
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/api.js"></script>
  <script src="js/helpers.js"></script>
  <script>
    const session = requireSession(['security'])
    if (!session) throw new Error('no session')
    renderNav('', session)

    const regLabels = { 
      'visitor': t('reg_by_visitor'), 
      'owner': t('reg_by_owner'), 
      'tenant': t('reg_by_tenant'), 
      'guard': t('reg_by_guard') 
    }

    function showHome() {
      stopScanner();
      document.getElementById('mainContent').innerHTML = `
        <div class="page-header animate-in">
          <div class="page-icon" style="background:rgba(159,122,234,.12);border:1px solid rgba(159,122,234,.2)">🛡️</div>
          <h1 class="page-title">${t('role_security')}</h1>
          <p class="page-subtitle">${session.name}</p>
        </div>
        <div class="menu-grid animate-in" style="animation-delay:.05s">
            <div class="menu-card" onclick="showScan()">
              <div class="menu-icon">🔍</div>
              <div class="menu-label">${t('guard_scan')}</div>
              <div class="menu-desc">${t('guard_scan_desc')}</div>
            </div>
            <div class="menu-card" onclick="showWalkin()">
              <div class="menu-icon">📝</div>
              <div class="menu-label">${t('guard_walkin')}</div>
              <div class="menu-desc">${t('guard_walkin_desc')}</div>
            </div>
            <div class="menu-card" onclick="showCheckout()">
              <div class="menu-icon">🚪</div>
              <div class="menu-label">${t('guard_checkout')}</div>
              <div class="menu-desc">${t('guard_checkout_desc')}</div>
            </div>
            <div class="menu-card" onclick="showLog()">
              <div class="menu-icon">📋</div>
              <div class="menu-label">${t('guard_tab_all')}</div>
              <div class="menu-desc">${t('guard_log_desc')}</div>
            </div>
        </div>`
    }

    function showScan() {
      document.getElementById('mainContent').innerHTML = `
        <div class="back-btn" onclick="showHome()">${t('nav_back')}</div>
        <div class="page-header animate-in">
          <div class="page-icon gold">🔍</div>
          <h1 class="page-title">${t('guard_scan')}</h1>
          <p class="page-subtitle">${t('guard_scan_ph')}</p>
        </div>
        <div class="section animate-in" style="animation-delay:.05s">
          <div id="reader"></div>
          <button id="btn-toggle-scan" class="btn btn-outline" style="width:100%;margin-bottom:20px;" onclick="toggleScanner()">📷 ${t('scan_open')}</button>
          
          <div class="divider"></div>

          <div class="section-title">${t('vis_ref_code')}</div>
          <input id="scanInput" style="text-transform:uppercase;margin-bottom:8px" placeholder="KESXXXXXX" onkeydown="if(event.key==='Enter')doScan()">
          <button class="btn btn-gold" onclick="doScan()">${t('vis_check_btn')}</button>
          <div id="scanResult"></div>
        </div>`
    }

    async function doScan() {
      const code = document.getElementById('scanInput').value.trim().toUpperCase()
      if (!code) return
      const el = document.getElementById('scanResult')
      el.innerHTML = `<p style="font-size:13px;color:var(--text-muted);padding:12px 0">${t('loading')}</p>`
      try {
        const v = await apiGetVisitorByRef(code)
        if (!v) { el.innerHTML = `<p style="font-size:13px;color:var(--red);padding:12px 0">${t('vis_check_not_found')}</p>`; return }
        await renderScanResult(v)
      } catch(e) { el.innerHTML = `<p style="font-size:13px;color:var(--red);padding:12px 0">${t('error_server')}</p>` }
    }

    async function renderScanResult(v) {
      const expired = isExpired(v)
      let actionHtml = ''
      if      (v.status === 'Checked Out')  actionHtml = `<div class="status-msg ok">✓ ${t('guard_already_out')}</div>`
      else if (v.status === 'Checked In')   actionHtml = `<button class="btn btn-outline" onclick="quickCheckout(${v.id})" style="width:100%; margin-top:10px">🚪 ${t('guard_checkout')}</button>`
      else if (expired)                     actionHtml = `<div class="status-msg err">⚠️ ${t('guard_expired')}</div>`
      else if (v.status === 'Approved')     actionHtml = `<button class="btn btn-gold btn-checkin" onclick="quickCheckin(${v.id})">✓ ${t('guard_checkin')}</button>`
      else if (v.status === 'Rejected')     actionHtml = `<div class="status-msg err">✕ ${t('vis_status_rejected')}</div>`
      else                                  actionHtml = `<div class="status-msg warn">⏳ ${t('guard_not_approved')}</div>`

      let contactHtml = ''
      if (v.status === 'Pending') {
        const owner = await apiGetOwner(v.unit)
        if (owner) {
          const contacts = [['Owner', owner.phone],owner.tenant1?['Tenant 1',owner.tenant1]:null,owner.tenant2?['Tenant 2',owner.tenant2]:null,owner.tenant3?['Tenant 3',owner.tenant3]:null].filter(Boolean)
          contactHtml = `<div class="contact-block">
            <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px">${t('guard_contacts')} ${v.unit}</div>
            ${contacts.map(([r,p])=>`<div class="contact-row"><span style="color:var(--text-muted)">${r}</span><a href="tel:${p}" style="font-family:'JetBrains Mono',monospace;color:var(--accent);text-decoration:none;font-weight:600">${p}</a></div>`).join('')}
          </div>`
        }
      }

      document.getElementById('scanResult').innerHTML = `
        <div class="result-card animate-in">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
            <div style="font-family:var(--heading-font);font-size:18px;font-weight:800">${v.name}</div>
            ${statusBadge(v.status)}
          </div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:12px">${v.ref_code} · ${t('res_unit_label')} ${v.unit}</div>
          <div class="reg-tag">${regLabels[v.registered_by] || v.registered_by}</div>
          <div class="info-row"><span class="info-label">IC</span><span style="font-weight:700">${v.ic_no}</span></div>
          <div class="info-row"><span class="info-label">${t('vis_phone')}</span><span>${v.phone}</span></div>
          <div class="info-row"><span class="info-label">${t('vis_purpose')}</span><span>${v.purpose}</span></div>
          <div class="info-row"><span class="info-label">${t('vis_vehicle_plate')}</span><span style="font-weight:700">${v.vehicle_plate||'—'}</span></div>
          <div class="info-row"><span class="info-label">${t('today')}</span><span>${fmtDate(v.created_at)}</span></div>
          ${v.checked_in_at?`<div class="info-row"><span class="info-label">${t('vis_status_checkedin')}</span><span>${fmtDate(v.checked_in_at)}</span></div>`:''}
          <div style="margin-top:12px">${actionHtml}</div>
          ${contactHtml}
        </div>`
    }

    async function quickCheckin(id) {
      await apiUpdateVisitorStatus(id, 'Checked In')
      showToast(t('guard_checkin_ok'), 'success')
      document.getElementById('scanInput').value = ''
      document.getElementById('scanResult').innerHTML = ''
    }
    async function quickCheckout(id) {
      await apiUpdateVisitorStatus(id, 'Checked Out')
      showToast(t('guard_checkout_ok'), 'success')
      document.getElementById('scanInput').value = ''
      document.getElementById('scanResult').innerHTML = ''
    }

    function showWalkin() {
      document.getElementById('mainContent').innerHTML = `
        <div class="back-btn" onclick="showHome()">${t('nav_back')}</div>
        <div class="page-header animate-in">
          <div class="page-icon teal">📝</div>
          <h1 class="page-title">${t('guard_walkin')}</h1>
          <p class="page-subtitle">${t('guard_walkin_desc')}</p>
        </div>
        <div class="section animate-in" style="animation-delay:.04s">
          <div class="section-title">${t('vis_sec_unit')}</div>
          <div class="field">
            <label>${t('res_floor_label')}</label>
            <div class="select-wrap"><select id="wi-floor" onchange="onWiFloorChange()"><option value="">— ${t('res_floor_ph')} —</option></select></div>
          </div>
          <div class="field" id="wi-unit-wrap" style="display:none">
            <label>${t('res_unit_label')}</label>
            <div class="select-wrap"><select id="wi-unit" onchange="onWiUnitChange()"><option value="">— ${t('res_unit_ph')} —</option></select></div>
          </div>
          <div id="wi-contacts" style="display:none"></div>
        </div>
        <div class="section animate-in" style="animation-delay:.06s">
          <div class="section-title">${t('vis_sec_info')}</div>
          <div class="field"><label>${t('vis_name')}</label><input id="wi-name" placeholder="${t('vis_name_ph')}"></div>
          <div class="field"><label>${t('vis_ic')}</label><input id="wi-ic" placeholder="${t('vis_ic_ph')}"></div>
          <div class="field"><label>${t('vis_phone')}</label><input id="wi-phone" type="tel" placeholder="${t('vis_phone_ph')}"></div>
          <div class="field">
            <label>${t('vis_vehicle_type')}</label>
            <div class="select-wrap">
              <select id="wi-vtype" onchange="onWiVehicleChange()">
                <option value="">— ${t('vis_vehicle_type_ph')} —</option>
                <option value="Kereta">${t('vis_vehicle_car')}</option>
                <option value="Motosikal">${t('vis_vehicle_moto')}</option>
                <option value="Lori / Van">${t('vis_vehicle_lorry')}</option>
                <option value="Tiada">${t('vis_vehicle_none')}</option>
              </select>
            </div>
          </div>
          <div class="field" id="wi-plate-field">
            <label>${t('vis_vehicle_plate')}</label><input id="wi-plate" style="text-transform:uppercase" placeholder="${t('vis_vehicle_plate_ph')}">
          </div>
          <div class="field">
            <label>${t('vis_purpose')}</label>
            <div class="select-wrap">
              <select id="wi-purpose">
                <option value="">— ${t('vis_purpose_ph')} —</option>
                <option value="Ziarah">${t('vis_purp_visit')}</option>
                <option value="Hantar Barang">${t('vis_purp_del')}</option>
                <option value="Kerja">${t('vis_purp_work')}</option>
                <option value="Pembaikan">${t('vis_purp_rep')}</option>
                <option value="Lain-lain">${t('vis_purp_oth')}</option>
              </select>
            </div>
          </div>
        </div>
        <button class="btn btn-gold animate-in" onclick="submitWalkin()" id="wi-btn" style="animation-delay:.08s">✓ ${t('guard_approve_checkin')}</button>
        <div id="wi-result"></div>`

      const fs = document.getElementById('wi-floor')
      FLOORS.forEach(f => { const o=document.createElement('option'); o.value=f; o.textContent=t('res_floor_label')+' '+f; fs.appendChild(o) })
    }

    function onWiFloorChange() {
      const f = document.getElementById('wi-floor').value
      const us = document.getElementById('wi-unit')
      document.getElementById('wi-unit-wrap').style.display = f ? 'block' : 'none'
      document.getElementById('wi-contacts').style.display = 'none'
      us.innerHTML = `<option value="">— ${t('res_unit_ph')} —</option>`
      if (!f) return
      UNITS.forEach(u => { const o=document.createElement('option'); o.value=f+'-'+u; o.textContent=t('res_unit_label')+' '+u; us.appendChild(o) })
    }

    async function onWiUnitChange() {
      const unit = document.getElementById('wi-unit').value
      const el   = document.getElementById('wi-contacts')
      if (!unit) { el.style.display = 'none'; return }
      const owner = await apiGetOwner(unit)
      if (!owner) { el.style.display = 'none'; return }
      const contacts = [['Owner',owner.phone],owner.tenant1?['Tenant 1',owner.tenant1]:null,owner.tenant2?['Tenant 2',owner.tenant2]:null,owner.tenant3?['Tenant 3',owner.tenant3]:null].filter(Boolean)
      el.style.display = 'block'
      el.innerHTML = `<div class="contact-block" style="margin-top:0;margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px">${t('guard_contacts')}</div>
        ${contacts.map(([r,p])=>`<div class="contact-row"><span style="color:var(--text-muted)">${r}</span><a href="tel:${p}" style="font-family:'JetBrains Mono',monospace;color:var(--accent);text-decoration:none;font-weight:600">${p}</a></div>`).join('')}
      </div>`
    }

    function onWiVehicleChange() {
      const v = document.getElementById('wi-vtype').value
      document.getElementById('wi-plate-field').style.display = v === 'Tiada' ? 'none' : 'block'
      if (v === 'Tiada') document.getElementById('wi-plate').value = 'TIADA'
      else if (document.getElementById('wi-plate').value === 'TIADA') document.getElementById('wi-plate').value = ''
    }

   async function submitWalkin() {
  const unit    = document.getElementById('wi-unit').value
  const name    = document.getElementById('wi-name').value.trim()
  const ic_no   = document.getElementById('wi-ic').value.trim()
  const phone   = document.getElementById('wi-phone').value.trim()
  const vtype   = document.getElementById('wi-vtype').value
  const plate   = document.getElementById('wi-plate').value.trim().toUpperCase()
  const purpose = document.getElementById('wi-purpose').value

  // 1. Validasi
  if (!unit || !name || !ic_no || !phone || !plate || !purpose) { 
    showToast(t('vis_error_fill'), 'error-toast'); 
    return 
  }

  const btn = document.getElementById('wi-btn')
  btn.textContent = t('loading'); btn.disabled = true

  try {
    // 2. Daftar Pelawat
    const result = await apiRegisterVisitor({
      name, ic_no, phone, vehicle_type: vtype, vehicle_plate: plate, 
      unit, purpose, registered_by: 'guard', registered_phone: null
    })

    // 3. Auto Approve & Check In
    await apiUpdateVisitorStatus(result.id, 'Approved', { approved_by: 'guard-' + session.username })
    await apiUpdateVisitorStatus(result.id, 'Checked In')

    // 4. Beri maklum balas kejayaan
    showToast(t('guard_checkin_ok'), 'success')

    // 5. TUTUP FORM: Balik ke Dashboard selepas 1.5 saat
    setTimeout(() => {
      showHome(); // Fungsi ini akan merender semula menu utama (grid)
    }, 1500);

  } catch(e) {
    showToast(t('error_server'), 'error-toast')
    btn.textContent = '✓ ' + t('guard_approve_checkin'); btn.disabled = false
  }
}

    function showCheckout() {
      document.getElementById('mainContent').innerHTML = `
        <div class="back-btn" onclick="showHome()">${t('nav_back')}</div>
        <div class="page-header animate-in">
          <div class="page-icon style="background:rgba(159,122,234,.12);border:1px solid rgba(159,122,234,.2)">🚪</div>
          <h1 class="page-title">${t('guard_checkout')}</h1>
          <p class="page-subtitle">${t('guard_checkout_desc')}</p>
        </div>
        <div class="section animate-in" style="animation-delay:.05s">
          <div class="section-title">${t('vis_ref_code')}</div>
          <input id="coInput" style="text-transform:uppercase;margin-bottom:8px" placeholder="KESXXXXXX" onkeydown="if(event.key==='Enter')doCheckout()">
          <button class="btn btn-gold" onclick="doCheckout()">🚪 ${t('guard_checkout')}</button>
          <div id="coResult"></div>
        </div>
        <div style="margin-top:14px">
          <div class="section-title" style="margin-bottom:10px">${t('guard_checkout_sub')}</div>
          <div id="insideList"><p style="font-size:13px;color:var(--text-muted);text-align:center;padding:20px">${t('loading')}</p></div>
        </div>`
      loadInsideVisitors()
    }

    async function loadInsideVisitors() {
      const all = await apiGetAllVisitors()
      const inside = all.filter(v => v.status === 'Checked In')
      const el = document.getElementById('insideList')
      if (!inside.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">🚪</div><p>${t('guard_no_inside')}</p></div>`; return }
      el.innerHTML = inside.map((v,i)=>`
        <div class="vis-card in animate-in" style="animation-delay:${i*0.04}s">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
            <div class="vis-name">${v.name}</div>
            <button class="btn-sm btn-checkout" onclick="checkoutById(${v.id},'${v.ref_code}')">🚪 OUT</button>
          </div>
          <div class="vis-meta">${v.ref_code} · Unit ${v.unit}</div>
          <div style="font-size:12px;color:var(--text-muted)">${v.purpose} · ${v.vehicle_plate||'—'}</div>
          <div style="font-size:11px;color:var(--green);margin-top:4px">↓ ${t('vis_status_checkedin')}: ${fmtDate(v.checked_in_at)}</div>
        </div>`).join('')
    }

    async function doCheckout() {
      const code = document.getElementById('coInput').value.trim().toUpperCase()
      if (!code) return
      const v = await apiGetVisitorByRef(code)
      const el = document.getElementById('coResult')
      if (!v) { el.innerHTML=`<p style="color:var(--red);font-size:13px;padding:12px 0">${t('vis_check_not_found')}</p>`; return }
      if (v.status !== 'Checked In') { el.innerHTML=`<p style="color:var(--accent);font-size:13px;padding:12px 0">${t('vis_status')}: ${t('vis_status_'+v.status.toLowerCase().replace(' ',''))}</p>`; return }
      await apiUpdateVisitorStatus(v.id,'Checked Out')
      showToast(t('guard_checkout_ok'),'success')
      document.getElementById('coInput').value=''
      el.innerHTML=`<div style="padding:12px 0;font-size:13px;color:var(--green)">✓ ${v.name} (${v.ref_code}) ${t('guard_already_out')}.</div>`
      loadInsideVisitors()
    }

    async function checkoutById(id, ref) {
      await apiUpdateVisitorStatus(id,'Checked Out')
      showToast(t('guard_checkout_ok'),'success')
      loadInsideVisitors()
    }

    async function showLog() {
      document.getElementById('mainContent').innerHTML = `
        <div class="back-btn" onclick="showHome()">${t('nav_back')}</div>
        <div class="page-header animate-in">
          <div class="page-icon gold">📋</div>
          <h1 class="page-title">${t('guard_tab_all')}</h1>
          <p class="page-subtitle">${t('guard_log_desc')}</p>
        </div>
        <div style="margin-bottom:10px">
          <input id="logSearch" oninput="filterLog()" style="height:40px" placeholder="${t('search_ph')}">
        </div>
        <div id="logContent" class="animate-in"><p style="font-size:13px;color:var(--text-muted);text-align:center;padding:24px">${t('loading')}</p></div>`
      const all = await apiGetAllVisitors()
      window._allLog = all
      filterLog()
    }

    function filterLog() {
      const s = (document.getElementById('logSearch')?.value||'').toUpperCase()
      const list = s ? window._allLog.filter(v=>v.ref_code.includes(s)||v.name.toUpperCase().includes(s)||v.unit.includes(s)) : window._allLog
      const el = document.getElementById('logContent')
      if (!list.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>${t('owner_no_visitors')}</p></div>`; return }
      el.innerHTML = list.map((v,i)=>`
        <div class="vis-card animate-in ${v.status==='Checked In'?'in':v.status==='Checked Out'?'out':''}" style="animation-delay:${i*0.03}s">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
            <div class="vis-name">${v.name}</div>${statusBadge(v.status)}
          </div>
          <div style="font-size:11px; color:var(--accent); font-weight:700; margin:4px 0">
            IC: ${v.ic_no} · Tel: ${v.phone}
          </div>
          <div class="vis-meta">${v.ref_code} · Unit ${v.unit} · ${fmtDate(v.created_at)}</div>
          <div style="font-size:11px;color:var(--text-muted)">${v.purpose} · ${v.vehicle_plate||'—'} (${v.vehicle_type||'N/A'})</div>
          <div class="reg-tag">${regLabels[v.registered_by] || v.registered_by}</div>
          <div style="font-size:10px; color:var(--text-soft); margin-top:8px; border-top:1px solid var(--border); padding-top:6px">
            ${v.checked_in_at?`↓ ${t('status_checkedin')}: ${fmtDate(v.checked_in_at)}`:''}
            ${v.checked_out_at?`<br>↑ ${t('vis_status_checkout')}: ${fmtDate(v.checked_out_at)}`:''}
          </div>
        </div>`).join('')
    }

    let scannerInstance = null;

async function toggleScanner() {
  const btn = document.getElementById('btn-toggle-scan');
  const readerEl = document.getElementById('reader');
  const inputEl = document.getElementById('scanInput');

  // 1. Jika scanner tengah On, kita Off-kan
  if (scannerInstance && scannerInstance.isScanning) {
    await stopScanner();
    return;
  }

  // 2. Persediaan untuk On-kan kamera
  readerEl.style.display = 'block';
  btn.textContent = `✕ ${t('scan_stop')}`;

  if (!scannerInstance) {
    scannerInstance = new Html5Qrcode("reader");
  }

  const config = { 
    fps: 20, 
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0,
    experimentalFeatures: { useBarCodeDetectorIfSupported: true }
  };

  try {
    await scannerInstance.start(
      { facingMode: "environment" }, 
      config,
      (decodedText) => {
        // --- JIKA BERJAYA SCAN ---
        const cleanCode = decodedText.trim().toUpperCase();
        
        // Fill in reference code input textbox
        inputEl.value = cleanCode;
        
        // Papar Toast Success
        showToast(t('scan_success'), 'success');
        
        // Haptic Feedback (Vibrate)
        if (navigator.vibrate) navigator.vibrate(100);
        
        // Tutup kamera & terus buat semakan database
        stopScanner();
        doScan(); 
      }
    );
    scannerInstance.isScanning = true;
  } catch (err) {
    // --- JIKA GAGAL LAUNCH/SCAN ---
    console.error("Scanner Error:", err);
    showToast(t('scan_failed'), 'error-toast');
    
    readerEl.style.display = 'none';
    btn.textContent = `📷 ${t('scan_open')}`;
    scannerInstance.isScanning = false;
  }
}

async function stopScanner() {
  if (scannerInstance && scannerInstance.isScanning) {
    try {
      await scannerInstance.stop();
      scannerInstance.isScanning = false;
    } catch (err) {
      console.warn("Scanner already stopped.");
    }
  }
  document.getElementById('reader').style.display = 'none';
  document.getElementById('btn-toggle-scan').textContent = `📷 ${t('scan_open')}`;
}

    showHome()
