<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cara Guna — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .acc-item{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:8px;transition:border-color .2s}
    .acc-item.open{border-color:rgba(var(--accent-rgb),.35)}
    .acc-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
    .acc-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .acc-icon.gold{background:var(--accent-dim);border:1px solid rgba(var(--accent-rgb),.2)}
    .acc-icon.teal{background:rgba(76,175,125,.1);border:1px solid rgba(76,175,125,.2)}
    .acc-icon.purple{background:rgba(159,122,234,.1);border:1px solid rgba(159,122,234,.2)}
    .acc-icon.red{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.2)}
    .acc-icon.blue{background:rgba(99,179,237,.1);border:1px solid rgba(99,179,237,.2)}
    .acc-icon.green{background:rgba(76,175,125,.1);border:1px solid rgba(76,175,125,.2)}
    .acc-label{flex:1}
    .acc-name{font-family:var(--heading-font);font-size:14px;font-weight:800}
    .acc-role{font-size:11px;color:var(--text-muted);margin-top:1px}
    .acc-chevron{font-size:11px;color:var(--text-muted);transition:transform .25s}
    .acc-item.open .acc-chevron{transform:rotate(180deg)}
    .acc-body{display:none;padding:0 16px 14px}
    .acc-item.open .acc-body{display:block}
    .step-list{list-style:none;padding:0;margin:0}
    .step-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.5}
    .step-item:last-child{border-bottom:none}
    .step-num{width:22px;height:22px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(var(--accent-rgb),.2);color:var(--accent);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .step-text{flex:1;color:var(--text-muted)}
    .step-text strong{color:var(--text);font-weight:600}
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>
  <main class="main">
    <div class="page-header animate-in">
      <div class="page-icon gold">📖</div>
      <h1 class="page-title" id="txt-title"></h1>
      <p class="page-subtitle" id="txt-subtitle"></p>
    </div>
    <div id="accordionList" class="animate-in" style="animation-delay:.05s"></div>
  </main>
  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script>
    renderNav('card_how')
    document.getElementById('txt-title').textContent=t('how_title')
    document.getElementById('txt-subtitle').textContent=t('how_subtitle')
    const items=[
      {icon:'📝',color:'teal',name:'Daftar Pelawat (Sendiri)',role:'Visitor dari luar',
        steps:['Buka halaman <strong>Daftar Pelawat</strong>','Pilih unit yang nak dilawati, isi maklumat diri, kenderaan dan tujuan','Tekan <strong>Daftar Sekarang</strong> — dapat Kod Rujukan + QR Code','Tunjuk QR kepada guard bila tiba — guard boleh check in selepas pemilik lulus']},
      {icon:'🏠',color:'teal',name:'Owner / Penyewa — Daftar Pelawat',role:'Daftar & kongsi QR kepada pelawat',
        steps:['Login ke halaman <strong>Owner</strong> dengan no. telefon','Pergi tab <strong>Pelawat</strong> → klik <strong>Daftar Pelawat Baru</strong>','Isi maklumat pelawat — pelawat <strong>auto-diluluskan</strong> serta-merta','Kongsi QR code atau Ref Code kepada pelawat — guard boleh terus check in']},
      {icon:'🏠',color:'green',name:'Owner — Lulus Pelawat Guard',role:'Luluskan pelawat yang didaftarkan guard',
        steps:['Login ke <strong>Owner</strong>','Pergi tab <strong>Lulus</strong> — senarai pelawat didaftar guard yang menunggu','Klik <strong>Lulus</strong> atau <strong>Tolak</strong>','Guard akan check in pelawat yang diluluskan']},
      {icon:'🛡️',color:'purple',name:'Security / Guard',role:'Kawalan pintu masuk',
        steps:['Login dengan PIN (1125)','Masukkan <strong>Ref Code</strong> atau scan QR visitor di kotak imbas','Jika visitor <strong>Diluluskan</strong> — klik Check In','Jika visitor <strong>Walk-in</strong> — daftar visitor, hubungi owner, klik "Lulus & Check In"','Bila visitor pulang — cari rekod dan klik <strong>Check Out</strong>']},
      {icon:'🔍',color:'blue',name:'Semak Status Lawatan',role:'Visitor semak status permohonan',
        steps:['Buka halaman <strong>Semak Status</strong>','Masukkan <strong>Kod Rujukan</strong> (contoh: KES4X7MNP)','Lihat status dan timeline — Berdaftar, Diluluskan, Masuk, Keluar','QR sah 24 jam selepas diluluskan']},
      {icon:'⚙️',color:'red',name:'Admin',role:'Akses penuh semua unit',
        steps:['Login dengan PIN (1125)','Tab <strong>Log Pelawat</strong> — semak semua rekod, filter by status','Tab <strong>Unit</strong> — edit nombor owner dan tenant (max 3 per unit)','Semua perubahan disimpan terus ke database']},
    ]
    const container=document.getElementById('accordionList')
    items.forEach(item=>{
      const div=document.createElement('div'); div.className='acc-item'
      div.innerHTML=`<div class="acc-header" onclick="toggle(this)"><div class="acc-icon ${item.color}">${item.icon}</div><div class="acc-label"><div class="acc-name">${item.name}</div><div class="acc-role">${item.role}</div></div><span class="acc-chevron">▼</span></div><div class="acc-body"><ul class="step-list">${item.steps.map((s,j)=>`<li class="step-item"><div class="step-num">${j+1}</div><div class="step-text">${s}</div></li>`).join('')}</ul></div>`
      container.appendChild(div)
    })
    function toggle(h){const i=h.closest('.acc-item');const w=i.classList.contains('open');document.querySelectorAll('.acc-item').forEach(e=>e.classList.remove('open'));if(!w)i.classList.add('open')}
  </script>
</body>
</html>
