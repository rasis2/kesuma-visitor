<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kesuma JMB — Log Masuk</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(var(--accent-rgb),.07) 0%,transparent 70%);pointer-events:none;z-index:0}
    .topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
    .topbar-logo{font-family:var(--heading-font);font-size:13px;font-weight:800;color:var(--text-muted)}
    .topbar-right{display:flex;gap:8px;align-items:center}
    .login-wrap{position:relative;z-index:1;width:min(420px,100%);padding:20px;box-sizing:border-box;margin-top:60px}
    .login-header{text-align:center;margin-bottom:20px}
    .login-logo{font-size:36px;margin-bottom:12px}
    .login-title{font-family:var(--heading-font);font-size:28px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
    .login-title span{color:var(--accent)}
    .login-sub{font-size:13px;color:var(--text-muted)}
    
    /* Panel Demo Collapsible */
    .demo-panel{background:var(--accent-dim);border:1px dashed var(--accent);border-radius:12px;margin-bottom:20px;transition:all 0.3s ease;overflow:hidden}
    .demo-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;user-select:none}
    .demo-header:hover{background:rgba(var(--accent-rgb), 0.05)}
    .demo-title{font-weight:800;color:var(--accent);letter-spacing:1px;text-transform:uppercase;font-size:10px}
    .demo-chevron{font-size:10px;color:var(--accent);transition:transform 0.3s ease}
    .demo-content{padding:0 16px 12px;display:none;animation:slideDown 0.3s ease forwards}
    
    /* State Open */
    .demo-panel.open .demo-content{display:block}
    .demo-panel.open .demo-chevron{transform:rotate(180deg)}

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .demo-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px;color:var(--text-soft);border-bottom:1px solid rgba(var(--accent-rgb), 0.1);padding-bottom:4px}
    .demo-row:last-child{margin-bottom:0;border-bottom:none}
    .demo-val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}

    .role-tabs{display:flex;gap:6px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:20px}
    .role-tab{flex:1;text-align:center;padding:8px 4px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text-muted);font-family:var(--heading-font)}
    .role-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.15)}
    .footer-note{position:fixed;bottom:12px;font-size:11px;color:var(--text-muted);opacity:.35}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-logo">Kesuma JMB</div>
    <div class="topbar-right">
      <div id="themeSwitcher"></div>
      <div id="langSwitcher"></div>
    </div>
  </div>

  <div class="login-wrap">
    <div class="login-header animate-in">
      <div class="login-logo">🏢</div>
      <div class="login-title" data-i18n="login_title">Kesuma <span>JMB</span></div>
      <div class="login-sub" data-i18n="login_sub">Residensi Kesuma, Beranang</div>
    </div>

    <!-- DEMO CREDENTIALS PANEL (COLLAPSIBLE) -->
    <div class="demo-panel animate-in" style="animation-delay:.02s" id="demoPanel">
      <div class="demo-header" onclick="toggleDemo()">
        <div class="demo-title" data-i18n="demo_title">AKAUN DEMO</div>
        <div class="demo-chevron" id="demoChevron">▼</div>
      </div>
      <div class="demo-content">
        <div class="demo-row">
          <span data-i18n="login_resident">🏠 Residen</span>
          <span class="demo-val" data-i18n="demo_res_hint">Unit 4-1 / Pass: 1234</span>
        </div>
        <div class="demo-row">
          <span data-i18n="login_security">🛡️ Security</span>
          <span class="demo-val">guard1 / kesuma1125</span>
        </div>
        <div class="demo-row">
          <span data-i18n="login_admin">⚙️ Admin</span>
          <span class="demo-val">admin / kesuma1125</span>
        </div>
      </div>
    </div>

    <!-- ROLE TABS -->
    <div class="role-tabs animate-in" style="animation-delay:.05s">
      <div class="role-tab active" onclick="switchRole('resident')" id="tab-resident" data-i18n="login_resident">🏠 Residen</div>
      <div class="role-tab" onclick="switchRole('security')" id="tab-security" data-i18n="login_security">🛡️ Security</div>
      <div class="role-tab" onclick="switchRole('admin')" id="tab-admin" data-i18n="login_admin">⚙️ Admin</div>
    </div>

    <!-- RESIDENT LOGIN -->
    <div id="form-resident" class="section animate-in" style="animation-delay:.08s">
      <div class="section-title" data-i18n="login_res_title">LOG MASUK RESIDEN</div>
      <div class="field">
        <label data-i18n="res_type_label">Jenis Residen</label>
        <div class="select-wrap">
          <select id="res-type" onchange="onResTypeChange()">
            <option value="" data-i18n="res_type_ph">— Pilih jenis —</option>
            <option value="owner" data-i18n="owner">Pemilik (Owner)</option>
            <option value="tenant" data-i18n="tenant">Penyewa (Tenant)</option>
          </select>
        </div>
      </div>
      <div id="res-unit-fields" style="display:none">
        <div class="field">
          <label data-i18n="res_floor_label">Tingkat</label>
          <div class="select-wrap">
            <select id="res-floor" onchange="onResFloorChange()">
              <option value="" data-i18n="res_floor_ph">— Pilih tingkat —</option>
            </select>
          </div>
        </div>
        <div class="field" id="res-unit-wrap" style="display:none">
          <label data-i18n="res_unit_label">No. Unit</label>
          <div class="select-wrap">
            <select id="res-unit">
              <option value="" data-i18n="res_unit_ph">— Pilih unit —</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label data-i18n="password_label">Password</label>
          <input type="password" id="res-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>
      <div class="error-text" id="res-error" style="margin-top:4px"></div>
      <button class="btn btn-gold" onclick="doLogin()" id="res-btn" style="margin-top:4px" data-i18n="login_btn">→ Log Masuk</button>
    </div>

    <!-- SECURITY LOGIN -->
    <div id="form-security" class="section animate-in" style="display:none;animation-delay:.08s">
      <div class="section-title" data-i18n="login_sec_title">LOG MASUK SECURITY</div>
      <div class="field">
        <label data-i18n="username_label">Username</label>
        <input id="sec-username" type="text" data-i18n="username_label" placeholder="Username" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="field">
        <label data-i18n="password_label">Password</label>
        <input id="sec-password" type="password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="error-text" id="sec-error" style="margin-top:4px"></div>
      <button class="btn btn-gold" onclick="doLogin()" style="margin-top:4px" data-i18n="login_btn">→ Log Masuk</button>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="form-admin" class="section animate-in" style="display:none;animation-delay:.08s">
      <div class="section-title" data-i18n="login_adm_title">LOG MASUK ADMIN</div>
      <div class="field">
        <label data-i18n="username_label">Username</label>
        <input id="adm-username" type="text" data-i18n="username_label" placeholder="Username" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="field">
        <label data-i18n="password_label">Password</label>
        <input id="adm-password" type="password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="error-text" id="adm-error" style="margin-top:4px"></div>
      <button class="btn btn-gold" onclick="doLogin()" style="margin-top:4px" data-i18n="login_btn">→ Log Masuk</button>
    </div>
  </div>

  <p class="footer-note" data-i18n="footer">Residensi Kesuma, Beranang · v2.2</p>

  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/helpers.js"></script>
  <script>
    renderThemeSwitcher('themeSwitcher')
    renderLangSwitcher('langSwitcher')

    // Fungsi Toggle Collapsible
    function toggleDemo() {
      const panel = document.getElementById('demoPanel');
      panel.classList.toggle('open');
    }

    const existing = getSession()
    if (existing) redirectRole(existing.role)

    let currentRole = 'resident'

    function switchRole(role) {
      currentRole = role
      ;['resident','security','admin'].forEach(r => {
        document.getElementById('tab-'+r).classList.toggle('active', r === role)
        document.getElementById('form-'+r).style.display = r === role ? 'block' : 'none'
      })
    }

    const floorSel = document.getElementById('res-floor')
    FLOORS.forEach(f => {
      const o = document.createElement('option'); o.value = f; 
      o.textContent = t('res_floor_label') + ' ' + f
      floorSel.appendChild(o)
    })

    function onResTypeChange() {
      const v = document.getElementById('res-type').value
      document.getElementById('res-unit-fields').style.display = v ? 'block' : 'none'
    }

    function onResFloorChange() {
      const f = document.getElementById('res-floor').value
      const us = document.getElementById('res-unit')
      document.getElementById('res-unit-wrap').style.display = f ? 'block' : 'none'
      us.innerHTML = `<option value="">${t('res_unit_ph')}</option>`
      if (!f) return
      UNITS.forEach(u => {
        const o = document.createElement('option'); o.value = f+'-'+u; 
        o.textContent = t('res_unit_label') + ' ' + u
        us.appendChild(o)
      })
    }

    async function doLogin() {
      const btn = document.querySelector(`#form-${currentRole} .btn`)
      const err = document.getElementById(`${currentRole === 'resident' ? 'res' : currentRole === 'security' ? 'sec' : 'adm'}-error`)
      
      let session = null;
      btn.innerHTML = `⏳ ${t('loading')}`; btn.disabled = true;

      try {
        if (currentRole === 'resident') {
          const type = document.getElementById('res-type').value
          const unit = document.getElementById('res-unit').value
          const password = document.getElementById('res-password').value
          if (!type || !unit || !password) { throw new Error(t('vis_error_fill')) }
          session = await apiLoginResident(unit, password)
        } else {
          const username = document.getElementById(`${currentRole === 'security' ? 'sec' : 'adm'}-username`).value.trim()
          const password = document.getElementById(`${currentRole === 'security' ? 'sec' : 'adm'}-password`).value
          if (!username || !password) { throw new Error(t('vis_error_fill')) }
          session = (currentRole === 'security') ? await apiLoginSecurity(username, password) : await apiLoginAdmin(username, password)
        }

        if (!session) throw new Error(t('admin_pin_error'))

        saveSession(session)
        redirectRole(session.role)
      } catch(e) {
        err.textContent = e.message;
      } finally {
        btn.innerHTML = `<span>${t('login_btn')}</span>`; btn.disabled = false;
      }
    }

    function redirectRole(role) {
      if (role === 'owner' || role === 'tenant') location.href = 'resident.html'
      else if (role === 'security') location.href = 'security.html'
      else if (role === 'admin') location.href = 'admin.html'
    }
  </script>
</body>
</html>
