<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security — Kesuma JMB</title>
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .scan-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
    .vis-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;transition:border-color .2s}
    .vis-card.in{border-left:3px solid var(--green)}
    .vis-card.out{border-left:3px solid var(--text-muted)}
    .vis-name{font-family:var(--heading-font);font-size:14px;font-weight:700;margin-bottom:2px}
    .vis-meta{font-size:11px;color:var(--text-muted);margin-bottom:6px;font-family:'JetBrains Mono',monospace}
    .btn-sm{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--body-font);transition:all .2s}
    .btn-checkin{background:rgba(99,179,237,.18);color:#63b3ed;border:1px solid rgba(99,179,237,.3)}
    .btn-checkout{background:var(--surface3);color:var(--text-muted);border:1px solid var(--border2)}
    .btn-approve-ci{background:var(--green);color:#fff}
    .tab-bar{display:flex;gap:6px;margin-bottom:14px;background:var(--surface2);border-radius:10px;padding:4px}
    .tab{flex:1;text-align:center;padding:8px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text-muted)}
    .tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.15)}
    .contact-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .contact-row:last-child{border-bottom:none}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:12px}
    .result-name{font-family:var(--heading-font);font-size:18px;font-weight:800;margin-bottom:4px}
    .result-meta{font-size:12px;color:var(--text-muted);margin-bottom:12px}
    .info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
    .info-row:last-child{border-bottom:none}
  </style>
</head>
<body>
  <nav class="nav" id="mainNav"></nav>

  <!-- PIN GATE -->
  <div id="pinGate" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 57px)">
    <div style="width:100%;max-width:340px;padding:20px">
      <div class="section animate-in">
        <div class="page-icon" style="background:rgba(159,122,234,.12);border:1px solid rgba(159,122,234,.2);margin-bottom:16px">🛡️</div>
        <h2 style="font-family:var(--heading-font);font-size:20px;font-weight:800;margin-bottom:4px" id="txt-pin-title"></h2>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px" id="txt-pin-sub"></p>
        <div class="field"><input type="password" id="guardPin" maxlength="10" onkeydown="if(event.key==='Enter')unlockGuard()" placeholder="••••"><div class="error-text" id="pinError"></div></div>
        <button class="btn btn-gold" onclick="unlockGuard()" id="txt-enter-btn"></button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none">
    <main class="main">
      <div class="page-header animate-in">
        <div class="page-icon" style="background:rgba(159,122,234,.12);border:1px solid rgba(159,122,234,.2)">🛡️</div>
        <h1 class="page-title" id="txt-title"></h1>
        <p class="page-subtitle" id="txt-subtitle"></p>
      </div>

      <!-- SCAN BOX -->
      <div class="scan-box animate-in">
        <div class="section-title" id="txt-scan-title"></div>
        <div style="display:flex;gap:8px">
          <input id="scanInput" style="flex:1;text-transform:uppercase" onkeydown="if(event.key==='Enter')doScan()" id="txt-scan-input">
          <button class="btn btn-gold" onclick="doScan()" style="flex-shrink:0;padding:0 16px" id="txt-scan-btn"></button>
        </div>
        <div id="scanResult" style="margin-top:0"></div>
      </div>

      <!-- REGISTER WALKIN -->
      <button class="btn btn-outline animate-in" onclick="location.href='visitor-register.html?from=guard'" id="txt-reg-btn" style="margin-bottom:14px"></button>

      <!-- VISITOR LIST -->
      <div class="tab-bar animate-in">
        <div class="tab active" onclick="switchTab('today')" id="tab-today"></div>
        <div class="tab" onclick="switchTab('all')" id="tab-all"></div>
      </div>
      <div style="margin-bottom:10px"><input id="searchInput" oninput="applyFilter()" style="height:40px"></div>
      <div id="visList"></div>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script src="js/i18n.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/api.js"></script>
  <script src="js/helpers.js"></script>
  <script>
    renderNav('guard_title')
    document.getElementById('txt-pin-title').textContent=t('guard_title')
    document.getElementById('txt-pin-sub').textContent=t('guard_pin_sub')
    document.getElementById('txt-enter-btn').textContent=t('enter')
    document.getElementById('txt-title').textContent=t('guard_title')
    document.getElementById('txt-subtitle').textContent=t('guard_subtitle')
    document.getElementById('txt-scan-title').textContent=t('guard_scan_title')
    document.getElementById('scanInput').placeholder=t('guard_scan_ph')
    document.getElementById('txt-scan-btn').textContent=t('guard_scan_btn')
    document.getElementById('txt-reg-btn').textContent='+ '+t('guard_reg_visitor')
    document.getElementById('tab-today').textContent=t('guard_tab_today')
    document.getElementById('tab-all').textContent=t('guard_tab_all')
    document.getElementById('searchInput').placeholder='Cari nama, unit atau kod...'

    let allVisitors=[], currentTab='today'

    function unlockGuard() {
      if(document.getElementById('guardPin').value!=='1125') { document.getElementById('pinError').textContent=t('admin_pin_error'); return }
      document.getElementById('pinGate').style.display='none'
      document.getElementById('dashboard').style.display='block'
      loadVisitors()
    }

    async function loadVisitors() {
      allVisitors=await apiGetAllVisitors()
      applyFilter()
    }

    function switchTab(tab) {
      currentTab=tab
      document.getElementById('tab-today').classList.toggle('active',tab==='today')
      document.getElementById('tab-all').classList.toggle('active',tab==='all')
      applyFilter()
    }

    function applyFilter() {
      const search=document.getElementById('searchInput').value.toUpperCase()
      const today=new Date().toDateString()
      let list=allVisitors
      if(currentTab==='today') list=list.filter(v=>new Date(v.created_at).toDateString()===today)
      if(search) list=list.filter(v=>v.ref_code.includes(search)||v.name.toUpperCase().includes(search)||v.unit.includes(search))
      renderList(list)
    }

    function renderList(list) {
      const el=document.getElementById('visList')
      if(!list.length){el.innerHTML='<div class="empty"><div class="empty-icon">🛡️</div><p>Tiada rekod.</p></div>';return}
      el.innerHTML=list.map(v=>`
        <div class="vis-card animate-in ${v.status==='Checked In'?'in':v.status==='Checked Out'?'out':''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px">
            <div class="vis-name">${v.name}</div>${statusBadge(v.status)}
          </div>
          <div class="vis-meta">${v.ref_code} · Unit ${v.unit} · ${fmtDate(v.created_at)}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">${v.purpose} · ${v.vehicle_plate||'—'}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${v.status==='Approved'?`<button class="btn-sm btn-checkin" onclick="doAction(${v.id},'Checked In')">${t('guard_checkin')}</button>`:''}
            ${v.status==='Checked In'?`<button class="btn-sm btn-checkout" onclick="doAction(${v.id},'Checked Out')">${t('guard_checkout')}</button>`:''}
            ${v.status==='Pending'&&v.registered_by==='guard'?`<button class="btn-sm btn-approve-ci" onclick="doAction(${v.id},'Approved')">${t('guard_approve_checkin')}</button>`:''}
          </div>
        </div>`).join('')
    }

    async function doAction(id, status) {
      await apiUpdateVisitorStatus(id, status)
      showToast(status==='Checked In'?t('guard_checkin_ok'):t('guard_checkout_ok'),'success')
      loadVisitors()
    }

    // SCAN function
    async function doScan() {
      const code=document.getElementById('scanInput').value.trim().toUpperCase()
      if(!code) return
      const el=document.getElementById('scanResult')
      el.innerHTML='<p style="font-size:13px;color:var(--text-muted);padding:12px 0">'+t('loading')+'</p>'
      try {
        const v=await apiGetVisitorByRef(code)
        if(!v){el.innerHTML='<p style="font-size:13px;color:var(--red);padding:12px 0">'+t('vis_check_not_found')+'</p>';return}
        renderScanResult(v)
      } catch(e){ el.innerHTML='<p style="font-size:13px;color:var(--red);padding:12px 0">'+t('error_server')+'</p>' }
    }

    function renderScanResult(v) {
      const expired=isExpired(v)
      let actionHtml=''
      if(v.status==='Checked Out') actionHtml=`<div style="padding:8px 10px;background:var(--surface2);border-radius:7px;font-size:12px;color:var(--text-muted)">${t('guard_already_out')}</div>`
      else if(v.status==='Checked In') actionHtml=`<div style="display:flex;gap:8px"><button class="btn-sm btn-checkout" onclick="quickAction(${v.id},'Checked Out')">${t('guard_checkout')}</button></div>`
      else if(expired) actionHtml=`<div style="padding:8px 10px;background:var(--surface2);border-radius:7px;font-size:12px;color:var(--red)">${t('guard_expired')}</div>`
      else if(v.status==='Approved') actionHtml=`<div style="display:flex;gap:8px"><button class="btn-sm btn-checkin" onclick="quickAction(${v.id},'Checked In')">${t('guard_checkin')}</button></div>`
      else if(v.status==='Pending'&&v.registered_by==='guard') actionHtml=`<div style="display:flex;gap:8px"><button class="btn-sm btn-approve-ci" onclick="quickAction(${v.id},'Approved')">${t('guard_approve_checkin')}</button></div>`
      else actionHtml=`<div style="padding:8px 10px;background:var(--surface2);border-radius:7px;font-size:12px;color:var(--accent)">${t('guard_not_approved')}</div>`

      document.getElementById('scanResult').innerHTML=`
        <div class="result-card">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div class="result-name">${v.name}</div>${statusBadge(v.status)}
          </div>
          <div class="result-meta">${v.ref_code} · Unit ${v.unit}</div>
          <div style="margin-bottom:12px">
            <div class="info-row"><span style="color:var(--text-muted)">Tujuan</span><span>${v.purpose}</span></div>
            <div class="info-row"><span style="color:var(--text-muted)">Kenderaan</span><span>${v.vehicle_plate||'—'}</span></div>
            <div class="info-row"><span style="color:var(--text-muted)">Daftar</span><span>${fmtDate(v.created_at)}</span></div>
            ${v.checked_in_at?`<div class="info-row"><span style="color:var(--text-muted)">Masuk</span><span>${fmtDate(v.checked_in_at)}</span></div>`:''}
          </div>
          ${actionHtml}
        </div>`
    }

    async function quickAction(id, status) {
      await apiUpdateVisitorStatus(id, status)
      showToast(status==='Checked In'?t('guard_checkin_ok'):t('guard_checkout_ok'),'success')
      document.getElementById('scanInput').value=''
      document.getElementById('scanResult').innerHTML=''
      loadVisitors()
    }
  </script>
</body>
</html>
